name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shard: [1/2, 2/2]   # Run tests in parallel (2 shards)

    steps:
    # 1. Checkout code
    - uses: actions/checkout@v4

    # 2. Setup Node with caching
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    # 3. Cache Playwright browsers (BIG speed boost)
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    # 4. Install dependencies
    - name: Install dependencies
      run: npm ci

    # 5. Install browsers only if not cached
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 6. Run tests in parallel shards
    - name: Run Playwright tests
      run: npx playwright test --shard=${{ matrix.shard }} --workers=2

    # 7. Upload report
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.shard }}
        path: playwright-report/
        retention-days: 7